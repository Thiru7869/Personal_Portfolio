# CI — lint → type-check → test → build on every push and PR.
# Mirrors the local validation pipeline; if this is green, Vercel
# will deploy the same commit successfully.
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build
        env:
          # Build must succeed with zero secrets — features degrade
          # gracefully. Site URL keeps sitemap/OG output deterministic.
          NEXT_PUBLIC_SITE_URL: https://example.com

  audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      # Gate on CRITICAL only. High/moderate advisories here are
      # transitive build-time deps inside Next.js (e.g. bundled
      # postcss) that aren't runtime-exploitable in a static deploy
      # and can't be fixed without downgrading Next — Dependabot
      # tracks those via PRs instead of hard-failing every build.
      - name: npm audit (production, critical)
        run: npm audit --omit=dev --audit-level=critical
